# Declarative Automation Bundle configuration
bundle:
  name: "Airflight-dev"

include:
  - resources/jobs/*.yml
  - resources/pipelines/*.yml
  - resources/notebooks/*.ipynb 

variables:
  catalog:
    description: workspace catalog name
    default: workspace
  bronze_schema:
    description: Schema for raw ingested data
    default: bronze
  silver_schema:
    description: Schema for cleaned validated data
    default: silver
  gold_schema:
    description: Schema for business ready aggregations
    default: gold
  quarantine_schema:
    description: Schema for failed quality check records
    default: quarantine

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-c96a283d-ad26.cloud.databricks.com

  prod:
    mode: production
    default: false
    workspace:
      host: https://dbc-c96a283d-ad26.cloud.databricks.com

    run_as:
      user_name: rana@ghazzi.com
    permissions:
      - user_name: rana@ghazzi.com
        level: CAN_MANAGE