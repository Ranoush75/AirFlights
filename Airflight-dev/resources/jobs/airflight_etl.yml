resources:
  jobs:
    AirFlights_ETL_Pipeline:
      name: AirFlights_ETL_Pipeline
      
      tasks:
        - task_key: Bronze-outbound
          notebook_task:
            notebook_path: ../notebooks/AirFlights_Bronze.ipynb
            source: WORKSPACE
            base_parameters:
              catalog: ${var.catalog}
              bronze_schema: ${var.bronze_schema}

          email_notifications:
            on_success: 
              - rana@ghazzi.com
            on_failure: 
              - rana@ghazzi.com
            
        - task_key: Bronze-Return
          depends_on:
            - task_key: Bronze-outbound
          notebook_task:
            notebook_path: ../notebooks/AirFlights-Bronze-Return.ipynb
            source: WORKSPACE
            base_parameters:
              catalog: ${var.catalog}
              bronze_schema: ${var.bronze_schema}

          email_notifications:
            on_success: 
              - rana@ghazzi.com
            on_failure: 
              - rana@ghazzi.com
            
        - task_key: Silver
          depends_on:
            - task_key: Bronze-Return
          notebook_task:
            notebook_path: ../notebooks/Airflights-Silver..ipynb
            source: WORKSPACE
            base_parameters:
              catalog: ${var.catalog}
              bronze_schema: ${var.bronze_schema}
              silver_schema: ${var.silver_schema}

          email_notifications:
            on_success: 
              - rana@ghazzi.com
            on_failure: 
              - rana@ghazzi.com
            
        - task_key: Gold
          depends_on:
            - task_key: Silver
          notebook_task:
            notebook_path: ../notebooks/Airflights-Gold..ipynb
            source: WORKSPACE
            base_parameters:
              catalog: ${var.catalog}
              silver_schema: ${var.silver_schema}
              gold_schema: ${var.gold_schema}

          email_notifications:
            on_success: 
              - rana@ghazzi.com
            on_failure: 
              - rana@ghazzi.com
      
      queue:
        enabled: true