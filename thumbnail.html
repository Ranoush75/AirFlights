<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airflights Data Pipeline — Thumbnail</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    .card {
      width: 1200px;
      height: 630px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 60px;
    }

    /* Title row */
    .title-row {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .plane-icon {
      font-size: 52px;
      line-height: 1;
    }

    .title {
      font-size: 52px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -1px;
    }

    /* Pipeline row */
    .pipeline {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .layer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .badge {
      width: 200px;
      padding: 18px 0;
      border-radius: 12px;
      text-align: center;
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .badge.bronze { background: #cd7f32; }
    .badge.silver { background: #a8a9ad; }
    .badge.gold   { background: #d4af37; }

    .layer-sub {
      font-size: 15px;
      color: #666;
      font-weight: 500;
    }

    .arrow {
      font-size: 32px;
      color: #aaa;
      margin: 0 20px;
      padding-bottom: 28px; /* align with badge center */
    }

    /* Tag rows */
    .tags-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .tag-row {
      display: flex;
      gap: 12px;
    }

    .tag {
      background: #f2f2f2;
      color: #333;
      border-radius: 999px;
      padding: 8px 20px;
      font-size: 15px;
      font-weight: 500;
    }

    .tag.highlight {
      background: #e8f0fe;
      color: #1a56db;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="title-row">
      <span class="plane-icon">✈</span>
      <span class="title">Airflights Data Pipeline</span>
    </div>

    <div class="pipeline">
      <div class="layer">
        <div class="badge bronze">Bronze</div>
        <span class="layer-sub">Raw Ingest</span>
      </div>

      <span class="arrow">→</span>

      <div class="layer">
        <div class="badge silver">Silver</div>
        <span class="layer-sub">Clean &amp; Enrich</span>
      </div>

      <span class="arrow">→</span>

      <div class="layer">
        <div class="badge gold">Gold</div>
        <span class="layer-sub">Analytics</span>
      </div>
    </div>

    <div class="tags-block">
      <div class="tag-row">
        <span class="tag highlight">DC Airports → Florida</span>
      </div>
      <div class="tag-row">
        <span class="tag">SerpAPI</span>
        <span class="tag">Delta Lake</span>
        <span class="tag">Python</span>
        <span class="tag">pandas</span>
      </div>
    </div>

  </div>
</body>
</html>
